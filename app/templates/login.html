<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
  <div class="container">
    <div class="content">
      <div class="form-section">
        <div class="titles">
          <span class="app-title">Finance tracker</span>
          <span class="form-title">Iniciar Sesión</span>
        </div>

        <div class="form-group">
          <label class="label">Email</label>
          <input type="text" class="input" id="email" placeholder="Tu correo">
          <span class="error" id="error-email"></span>
        </div>

        <div class="form-group">
          <label class="label">Contraseña</label>
          <input type="password" class="input" id="password" placeholder="Tu contraseña">
          <span class="error" id="error-password"></span>
        </div>

        <div class="forgot">
          <a href="/" class="forgot-link"><span>¿Olvidaste tu contraseña?</span></a>
        </div>

        <button class="btn-primary" onclick="validateForm()">
          <span title="Ingresar">Ingresar</span>
        </button>

        <div class="btn-google">
          <img src="../static/img/google_logo.png" alt="Google logo">
          <span  title="Ingresar con Google">Ingresar con Google</span>
        </div>

        <div class="divider"></div>

        <a href="/" class="signup"><span>Si todavía no tienes una cuenta, puedes crear una aquí.</span></a>
      </div>

      <img class="side-image" src="../static/img/Personal Home Finance 2 (1).png" alt="Finance illustration">
    </div>
  </div>
  <script src="../static/scripts.js"></script>
</body>
</html>
